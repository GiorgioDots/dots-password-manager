services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: somepassword
      POSTGRES_DB: dotspwd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dots-password-manager-v4
    restart: unless-stopped
    env_file:
      - ./.env.local
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      # Example: override DB connection for container networking
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: somepassword
      DATABASE_NAME: dotspwd

volumes:
  postgres_data: